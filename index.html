<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Hour - 퍼즐 게임</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">🚗 Rush Hour</div>
            <div class="move-counter">이동: <span id="moveCount">0</span></div>
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">쉬움</button>
                <button class="difficulty-btn" data-difficulty="normal">보통</button>
                <button class="difficulty-btn" data-difficulty="hard">어려움</button>
            </div>
        </div>

        <div class="board-section">
            <div class="board" id="board"></div>
            <div class="info-text">
                빨간 차를 오른쪽 출구로 탈출시키세요! 🎯
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-restart" id="restartBtn">다시 시작 🔄</button>
            <button class="btn btn-rules" id="rulesBtn">규칙 보기 📋</button>
        </div>
    </div>

    <div class="modal" id="rulesModal">
        <div class="modal-content">
            <div class="modal-title">🚗 Rush Hour 게임 규칙</div>
            <ul class="rules-list">
                <li><strong>목표:</strong> 빨간 차를 오른쪽 출구로 탈출시키세요! 🏁</li>
                <li><strong>보드:</strong> 6x6 그리드에서 게임이 진행됩니다</li>
                <li><strong>이동:</strong> 차량을 드래그하여 가로 또는 세로로만 이동 가능</li>
                <li><strong>충돌:</strong> 다른 차와 충돌할 수 없습니다</li>
                <li><strong>전략:</strong> 가장 적은 이동으로 클리어하세요! ⭐</li>
                <li><strong>별점:</strong> 10이동 ⭐⭐⭐ | 15이동 ⭐⭐ | 그 이상 ⭐</li>
            </ul>
            <button class="btn btn-start-game" id="startGameBtn">게임 시작 🎮</button>
        </div>
    </div>

    <div class="modal" id="clearModal">
        <div class="modal-content">
            <div class="modal-title">🎉 클리어!</div>
            <div class="modal-stats">
                <div>이동 횟수: <strong id="finalMoveCount">0</strong></div>
                <div class="star-rating" id="starRating"></div>
            </div>
            <button class="btn btn-close-modal" id="closeModalBtn">계속하기</button>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/vehicle.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
